<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VolleyNews</title>

<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">

<style>
/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background-color: #f5f5f5;
    color: #222;
}

/* HEADER */
.cabecalho {
    background-color: #1f4e79;
    padding: 15px 20px;
}

.conteudo-cabecalho {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.esquerda_cabecalho,
.direita_cabecalho,
.titulo-cabecalho {
    display: flex;
    align-items: center;
    gap: 15px;
}

.titulo-cabecalho {
    gap: 10px;
}

.h1-titulo-cabecalho {
    font-family: 'Instrument Serif', serif;
    color: white;
}

.bola-de-volei {
    color: white;
    width: 28px;
    height: 28px;
}

.botoes {
    background: transparent;
    border: 1px solid #4f84b3;
    color: white;
    padding: 8px 14px;
    border-radius: 6px;
    display: flex;
    gap: 6px;
    cursor: pointer;
    transition: 0.3s;
    align-items: center;
}

.botoes:hover {
    background-color: #2b6aa3;
}

/* CARROSSEL */
.carousel {
    max-width: 1200px;
    margin: 30px auto;
    position: relative;
    overflow: hidden;
        }

        .slides {
                display: flex;
                transition: transform 0.5s ease;
        }

        .slide {
            min-width: 100%;
            height: 250px;
            background: #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            min-width: 100%;
            height: 250px;
            overflow: hidden;
        }
        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
    
        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        /* Botões */
        .prev, .next {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background: transparent;
        border: none;
        font-size: 30px;
        cursor: pointer;
        }

        .prev {    
            left: 10px; 
            color: #bbb;
        }
        .next { 
            right: 10px; 
            color: #bbb;
        }

        /* Indicadores */
        .dots {
        text-align: center;
        margin-top: 10px;
        }

        .dot {
        height: 8px;
        width: 8px;
        margin: 5px;
        background: #bbb;
        display: inline-block;
        border-radius: 50%;
        cursor: pointer;
        }

        .dot.active {
        background: #555;
        }

/* NOTÍCIAS */
.noticias {
    max-width: 900px;
    margin: 40px auto;
    padding: 0 20px;
}

.noticias h1 {
    text-align: center;
    color: #1f4e79;
    font-family: 'Oswald', sans-serif;
    margin-bottom: 20px;
}

.noticias hr {
    margin: 20px 0;
}

/* CARD */
.card-noticia {
    display: flex;
    gap: 20px;
    margin-bottom: 25px;
}

/* IMAGEM */
.imagens img {
    width: 180px;
    height: 110px;
    object-fit: cover;
    border-radius: 8px;
}

/* TEXTO */
.textos {
    flex: 1;
}

.texto-titulo {
    font-family: 'Oswald', sans-serif;
    color: #06aa48;
    margin-bottom: 8px;
}

.texto_paragrafo {
    font-size: 0.95rem;
    color: #444;
    text-align: justify;
}

/* BOTÃO */
.botao-mostrar-mais {
    display: block;
    margin: 30px auto;
    background-color: #1f4e79;
    color: white;
    border: none;
    padding: 12px 25px;
    border-radius: 6px;
    cursor: pointer;
}

.botao-mostrar-mais:hover {
    background-color: #2b6aa3;
}

/* RODAPÉ */
.rodape {
    background-color: #1f4e79;
    color: white;
    text-align: center;
    padding: 40px 20px;
    margin-top: 40px;
}

</style>
</head>

<body>

<header class="cabecalho">
    <div class="conteudo-cabecalho">
        <div class="esquerda_cabecalho">
            <button class="botoes"><i data-lucide="menu"></i></button>
            <button class="botoes"><i data-lucide="shield"></i> Tabela</button>
        </div>

        <div class="titulo-cabecalho">
            <h1 class="h1-titulo-cabecalho">VolleyNews</h1>
            <i class="bola-de-volei" data-lucide="volleyball"></i>
        </div>

        <div class="direita_cabecalho">
            <button class="botoes"><i data-lucide="search"></i> Buscar</button>
        </div>
    </div>
</header>

<!-- CARROSSEL -->
 <div class="carousel">
        <div class="slides">
            <div class="slide">
                <img src="https://i.ytimg.com/vi/sDC8zaX74v0/maxresdefault.jpg">
            </div>
            <div class="slide">
                <img src="https://i.ytimg.com/vi/MtANig1DItE/hq720.jpg">
            </div>
            <div class="slide">
                <img src="https://i.ytimg.com/vi/LEJXkx5e6Ms/maxresdefault.jpg">
            </div>
            <div class="slide">
                <img src="https://i.ytimg.com/vi/L0hSRTZscJ0/hq720.jpg">
            </div>
        </div>
            <!-- Botões -->
        <button class="prev">&#10094;</button>
        <button class="next">&#10095;</button>

        <!-- Indicadores -->
        <div class="dots">
            <span class="dot active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
        </div>

<main class="noticias">
    <h1>Principais Notícias</h1>
    <hr>

    <div class="card-noticia">
        <div class="imagens">
            <img src="https://i.ytimg.com/vi/gcNMGeofpXk/hq720.jpg">
        </div>
        <div class="textos">
            <h3 class="texto-titulo">Clássico das Multidões</h3>
            <p class="texto_paragrafo">O Osasco recebe o Gerdau Minas em um duelo decisivo...</p>
        </div>
    </div>

    <hr>

    <div class="card-noticia">
        <div class="imagens">
            <img src="https://i.ytimg.com/vi/cAC5RnqO-p8/hq720.jpg">
        </div>
        <div class="textos">
            <h3 class="texto-titulo">Duelo de Campeões</h3>
            <p class="texto_paragrafo">Praia Clube enfrenta o Flamengo em confronto direto...</p>
        </div>
    </div>

    <hr>

    <div class="card-noticia">
        <div class="imagens">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSMGNyVx05qamMC3Os3eCR2tAZPaIgFFtfFMw&s">
        </div>
        <div class="textos">
            <h3 class="texto-titulo">Sexta de Decisões</h3>
            <p class="texto_paragrafo">A Superliga pode definir suas finalistas...</p>
        </div>
    </div>

    <button class="botao-mostrar-mais">MOSTRAR MAIS</button>
</main>

<footer class="rodape">
    <h1>VolleyNews</h1>
    <p>© Copyright 2026</p>
</footer>

<script src="https://unpkg.com/lucide@latest"></script>
<script>
lucide.createIcons();
</script>
<script src="script.js"></script>
</body>
</html>
